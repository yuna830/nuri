name: woori_guardian_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  flutter_native_splash: ^2.4.3  

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  image_picker: ^1.1.2
  kakao_map_sdk: ^1.2.6
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.12.0
  image: ^4.3.0

  kpostal: ^1.0.1

  flutter_localizations:
    sdk: flutter

  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# 앱 아이콘 설정
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_guardian.png"
  min_sdk_android: 21
  adaptive_icon_background: "#86A788"
  adaptive_icon_foreground: "assets/icon/icon_guardian.png"
  web:
    generate: false

# 스플래시 설정
flutter_native_splash:
  color: "#ffffff"
  image: assets/splash/splash_green.png
  android: true
  ios: true
  fullscreen: true
  android_12:
    color: "#ffffff"
    image: assets/splash/splash_green.png
  

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/
    - assets/splash/
